<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Ivy Africa Tender Portal</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#0B3D2E" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Syne:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{
  --green:#0B3D2E; --green2:#124A38; --orange:#E8722C; --blue:#1B4F8C;
  --bg:#F5F3EC; --card:#FFFFFF; --line:#E4E0D4; --ink:#16231C; --mut:#6E7368;
  --display:'DM Serif Display', Georgia, serif;
  --eyebrow:'Syne', system-ui, sans-serif;
  --body:'Inter', system-ui, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:var(--body);}
body{background:
    radial-gradient(1200px 400px at 100% -10%, rgba(232,114,44,.08), transparent 60%),
    radial-gradient(1000px 500px at -10% 110%, rgba(27,79,140,.06), transparent 60%),
    var(--bg);
  color:var(--ink);}
#app{min-height:100vh;max-width:1180px;margin:0 auto;padding:28px 20px 60px;}
h1{font-family:var(--display);font-size:30px;font-weight:400;letter-spacing:-.01em;color:var(--green);}
.sub{font-family:var(--eyebrow);color:var(--mut);font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin-top:6px;font-weight:600;}
.top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;flex-wrap:wrap;gap:12px;padding-bottom:22px;border-bottom:3px solid transparent;border-image:linear-gradient(90deg,var(--green) 0%,var(--green) 55%,var(--orange) 80%,var(--blue) 100%) 1;}
.brand{display:flex;align-items:center;gap:14px;}
.brand img{width:48px;height:48px;border-radius:50%;box-shadow:0 3px 10px rgba(11,61,46,.18);}
.dots{display:inline-flex;gap:5px;margin-left:8px;vertical-align:middle;}
.dots span{width:7px;height:7px;border-radius:50%;display:inline-block;}
.dots span:nth-child(1){background:#F2C94C;}
.dots span:nth-child(2){background:var(--orange);}
.dots span:nth-child(3){background:var(--blue);}
.reportbtns,.month-nav{display:flex;gap:8px;align-items:center;}
.reportbtns button{font-family:var(--eyebrow);background:var(--blue);color:#fff;border:none;border-radius:999px;padding:9px 16px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:transform .12s,box-shadow .12s,opacity .15s;box-shadow:0 2px 6px rgba(27,79,140,.25);}
.reportbtns button:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 4px 12px rgba(27,79,140,.3);}
.month-nav button{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 12px;cursor:pointer;font-size:13px;transition:background .12s,border-color .12s;}
.month-nav button:not(:disabled):hover{background:var(--bg);border-color:var(--green);}
.month-nav button:disabled{opacity:.4;cursor:default;}
.month-nav strong{font-family:var(--eyebrow);font-size:13px;color:var(--green);}

.tabbar{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--line);}
.tabbar button{font-family:var(--eyebrow);background:none;border:none;padding:13px 20px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s,background .15s;border-radius:8px 8px 0 0;}
.tabbar button:hover{color:var(--green);background:rgba(11,61,46,.04);}
.tabbar button.active{color:var(--green);border-bottom-color:var(--orange);background:rgba(11,61,46,.05);}
.tabbar button .pill{display:inline-block;margin-left:7px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:1px 8px;font-size:10px;color:var(--mut);font-weight:700;}
.tabbar button.active .pill{background:var(--orange);border-color:var(--orange);color:#fff;}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px;}
.grid2{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
@media(max-width:800px){.grid,.grid2{grid-template-columns:repeat(2,1fr);}}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(22,35,28,.05);transition:transform .15s,box-shadow .15s;}
.kpi:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(22,35,28,.1);}
.kpi::before{content:"";position:absolute;top:0;left:0;width:4px;height:100%;background:var(--green);}
.kpi .label{font-family:var(--eyebrow);font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--mut);font-weight:700;}
.kpi .val{font-family:var(--display);font-size:34px;margin-top:6px;color:var(--ink);}
.kpi .note{font-size:12.5px;color:var(--mut);margin-top:4px;}
.kpi.goal::before{background:var(--orange);} .kpi.goal .val{color:var(--green);}
.kpi.warn::before{background:#B23B2E;} .kpi.warn .val{color:#B23B2E;}
.kpi.won::before{background:var(--green);} .kpi.won .val{color:var(--green);}
.kpi.submitted::before{background:var(--blue);} .kpi.submitted .val{color:var(--blue);}
.kpi.pipeline::before{background:var(--orange);} .kpi.pipeline .val{color:var(--orange);}

.barwrap{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:20px;}
.barwrap .head{display:flex;justify-content:space-between;font-family:var(--eyebrow);font-size:11px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-bottom:10px;color:var(--green);}
.bar{height:12px;background:var(--bg);border-radius:7px;overflow:hidden;border:1px solid var(--line);}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--orange));border-radius:7px 0 0 7px;transition:width .3s;}

.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:20px;}
.panel h2{font-family:var(--eyebrow);font-size:13.5px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;color:var(--green);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--line);}
.formrow{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:8px;margin-bottom:10px;}
@media(max-width:800px){.formrow{grid-template-columns:1fr 1fr;}}
.formrow input,.formrow select{padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:var(--body);}
.formrow button{font-family:var(--eyebrow);background:var(--green);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:12px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;cursor:pointer;transition:background .15s,transform .12s;}
.formrow button:hover{background:var(--green2);transform:translateY(-1px);}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-family:var(--eyebrow);font-size:10px;text-transform:uppercase;color:var(--mut);letter-spacing:.05em;padding:8px 6px;border-bottom:2px solid var(--green);}
td{padding:10px 6px;border-bottom:1px solid var(--line);vertical-align:middle;}
tr:hover td{background:rgba(11,61,46,.03);}
.tag{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;font-family:var(--eyebrow);}
.tag.submitted{background:#E3ECF5;color:var(--blue);}
.tag.pipeline{background:#FDEBD9;color:var(--orange);}
.tag.missed{background:#FBE4E1;color:#B23B2E;}
.tag.won{background:#E4F0E9;color:var(--green);}
.tag.lost{background:#FBE4E1;color:#B23B2E;}
select.statusSel{border:none;background:transparent;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--eyebrow);}
.del{background:none;border:none;color:var(--mut);cursor:pointer;font-size:14px;}
.del:hover{color:#B23B2E;}
.empty{color:var(--mut);font-size:13px;padding:24px 0;text-align:center;font-style:italic;}

textarea{width:100%;min-height:90px;padding:12px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:monospace;resize:vertical;}
.scorepanel{display:none;margin-top:14px;border-top:1px solid var(--line);padding-top:14px;}
.scoregrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px;margin-bottom:10px;}
.verdict{display:inline-block;padding:5px 14px;border-radius:20px;font-weight:700;font-size:11px;font-family:var(--eyebrow);letter-spacing:.03em;text-transform:uppercase;}
.verdict.GO{background:#E4F0E9;color:var(--green);}
.verdict.SELECTIVE{background:#FDEBD9;color:var(--orange);}
.verdict.AVOID{background:#FBE4E1;color:#B23B2E;}
.crit{font-size:12px;padding:5px 0;border-bottom:1px dashed var(--line);}
.loading{font-size:13px;color:var(--mut);padding:10px 0;}

#loginScreen{max-width:420px;margin:12vh auto;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:44px 36px 38px;text-align:center;box-shadow:0 20px 50px rgba(22,35,28,.12);position:relative;overflow:hidden;}
#loginScreen::before{content:"";position:absolute;top:0;left:0;width:100%;height:6px;background:linear-gradient(90deg,var(--green),var(--orange),var(--blue));}
#loginScreen img.logo{width:72px;height:72px;border-radius:50%;margin-bottom:14px;box-shadow:0 6px 16px rgba(11,61,46,.2);}
#loginScreen img.logo-wide{width:100%;max-width:260px;height:auto;margin-bottom:16px;}
#loginScreen h1{margin-bottom:4px;}
#loginScreen input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:9px;margin:16px 0;font-size:14px;font-family:var(--body);transition:border-color .15s,box-shadow .15s;}
#loginScreen input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(11,61,46,.1);}
#loginScreen button{width:100%;font-family:var(--eyebrow);background:var(--green);color:#fff;border:none;border-radius:9px;padding:13px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;font-size:12px;cursor:pointer;transition:transform .12s,box-shadow .12s,background .15s;box-shadow:0 4px 12px rgba(11,61,46,.25);}
#loginScreen button:hover{background:var(--green2);transform:translateY(-1px);box-shadow:0 6px 16px rgba(11,61,46,.32);}
.tagline{font-family:var(--body);font-style:italic;color:var(--orange);font-size:12px;margin-top:2px;font-weight:500;}
#loginMsg{font-size:12px;color:var(--mut);margin-top:12px;}
.who{font-family:var(--eyebrow);font-size:11px;color:var(--mut);margin-top:6px;text-transform:uppercase;letter-spacing:.03em;}
.who button{background:none;border:none;color:var(--blue);cursor:pointer;text-decoration:underline;font-size:11px;font-family:var(--eyebrow);}

.livecard{text-align:center;padding:60px 30px;}
.livecard h2{font-family:var(--display);font-weight:400;font-size:24px;color:var(--green);border:none;margin-bottom:10px;padding:0;}
.livecard p{color:var(--mut);font-size:14px;max-width:480px;margin:0 auto;line-height:1.6;}

.brand-logo{height:52px;width:auto;}
.avatar{width:44px;height:44px;border-radius:50%;background:var(--green);color:#fff;border:none;font-family:var(--eyebrow);font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 3px 10px rgba(11,61,46,.25);transition:transform .12s;}
.avatar:hover{transform:scale(1.06);}
.avatar-lg{width:64px;height:64px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--eyebrow);font-weight:700;font-size:20px;margin:0 auto 14px;}

.modal-overlay{position:fixed;inset:0;background:rgba(11,35,26,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal-card{background:var(--card);border-radius:18px;padding:32px;max-width:420px;width:100%;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.3);}
.modal-card button#closeModalBtn{font-family:var(--eyebrow);background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:10px 20px;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.03em;cursor:pointer;}

.footer{text-align:center;font-size:11px;color:var(--mut);padding:30px 0 10px;font-family:var(--eyebrow);letter-spacing:.03em;}

#floatBg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
#app, #loginScreen{position:relative;z-index:1;}
.float-item{position:absolute;opacity:1;animation:drift linear infinite;}
.float-item svg{display:block;}
@keyframes drift{
  0%{transform:translate(0,110vh) rotate(0deg);}
  100%{transform:translate(var(--dx,60px),-15vh) rotate(var(--rot,25deg));}
}
@media (prefers-reduced-motion: reduce){
  .float-item{animation:none;display:none;}
}
</style>
</head>

<script>
// ---- Fill these in from Supabase → Project Settings → API ----
const SUPABASE_URL = "https://pfbqvelmvieqjcagdjot.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_iYqdTMSy4tx0SeoQKYWj_w_GeoRVhrc";
const ALLOWED_DOMAIN = "@ivyafrica.co.za";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const STATUSES = ["pipeline","submitted","won","lost","missed"];

let session = null;
let profile = null;
let rows = [];
let currentMonth = new Date().toISOString().slice(0,7);
let activeTab = "tenders";

function fmtR(n){ return "R "+Number(n||0).toLocaleString('en-ZA',{maximumFractionDigits:0}); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function monthLabel(m){ const [y,mo]=m.split('-'); return new Date(y,mo-1).toLocaleString('en-ZA',{month:'long',year:'numeric'}); }

async function init(){
  const { data } = await sb.auth.getSession();
  session = data.session;
  sb.auth.onAuthStateChange((event, s) => { session = s; profile = null; renderRoot(); if(event==='SIGNED_IN') logLogin(); });
  renderRoot();
}

async function logLogin(){
  let city="", country="", ip="";
  try{
    const r = await fetch('https://ipapi.co/json/');
    const j = await r.json();
    city = j.city || ""; country = j.country_name || ""; ip = j.ip || "";
  }catch(e){}
  await sb.from('login_logs').insert({
    email: session.user.email, ip_address: ip, city, country, user_agent: navigator.userAgent
  });
}

async function sendMagicLink(email){
  if(!email.endsWith(ALLOWED_DOMAIN)){
    document.getElementById('loginMsg').textContent = `Use your ${ALLOWED_DOMAIN} email address.`;
    return;
  }
  const { error } = await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo: window.location.origin } });
  document.getElementById('loginMsg').textContent = error ? error.message : "Check your inbox for the login link.";
}

async function loadProfile(){
  const { data, error } = await sb.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
  if(error){ profile = 'error:' + error.message; return; }
  profile = data || null;
}

async function saveProfile(fullName, role){
  if(!fullName){ document.getElementById('profileMsg').textContent = "Enter your full name."; return; }
  const { error } = await sb.from('profiles').upsert({
    id: session.user.id, email: session.user.email, full_name: fullName, role: role || null
  });
  if(error){ document.getElementById('profileMsg').textContent = error.message; return; }
  await loadProfile();
  renderRoot();
}

function renderRoot(){
  const floatBg = document.getElementById('floatBg');
  if(floatBg) floatBg.style.display = 'block';
  const app = document.getElementById('app');
  if(!session){
    app.innerHTML = `
      <div id="loginScreen">
        <img class="logo-wide" src="/logo-horizontal.png" alt="Ivy Africa" />
        <div class="sub">Tender Portal — employees only</div>
        <input id="emailInput" type="email" placeholder="you${ALLOWED_DOMAIN}" />
        <button id="sendLinkBtn">Send login link</button>
        <div id="loginMsg"></div>
      </div>`;
    document.getElementById('sendLinkBtn').onclick = () => sendMagicLink(document.getElementById('emailInput').value.trim());
    return;
  }

  if(profile === null){
    app.innerHTML = `<div class="livecard"><p>Loading your profile...</p></div>`;
    loadProfile().then(()=>{
      if(typeof profile === 'string' && profile.startsWith('error:')){
        app.innerHTML = `
          <div id="loginScreen">

let loadSeq = 0;
async function loadTenders(){
  const seq = ++loadSeq;
  const start = currentMonth + "-01";
  const [y,m] = currentMonth.split('-').map(Number);
  const end = new Date(y, m, 1).toISOString().slice(0,10);
  const { data, error } = await sb.from('tenders').select('*')
    .gte('created_at', start).lt('created_at', end).order('deadline', {ascending:true});
  if(seq !== loadSeq) return;
  rows = data || [];
  render();
  subscribeRealtime();
}

let channel = null;
function subscribeRealtime(){
  try{
    if(channel){ sb.removeChannel(channel); channel = null; }
    channel = sb.channel('tenders-changes-'+Date.now()).on('postgres_changes', { event:'*', schema:'public', table:'tenders' }, () => loadTenders()).subscribe();
  }catch(e){ console.warn('realtime subscribe skipped', e); }
}

async function addRow(name, entity, value, deadline, score, category){

    score: score||null, logged_by_email: session.user.email, category: category || 'tender'
  });
}
async function updateStatus(id, status){
  const patch = { status, updated_at: new Date().toISOString() };
  const row = rows.find(r=>r.id===id);
  if(status === 'submitted' && row && !row.submitted_date) patch.submitted_date = todayStr();
  await sb.from('tenders').update(patch).eq('id', id);
}

let navLocked = false;
function shiftMonth(delta){
  if(navLocked) return;
  navLocked = true;
  const [y,m]=currentMonth.split('-').map(Number);
  currentMonth = new Date(y,m-1+delta,1).toISOString().slice(0,7);
  loadTenders().finally(()=>{ navLocked = false; });
}

function daysInMonth(m){ const [y,mo]=m.split('-').map(Number); return new Date(y,mo,0).getDate(); }
function workingDaysSoFar(m){
  const today=new Date(); const isCurrent = m === today.toISOString().slice(0,7);
  const totalDays = isCurrent ? today.getDate() : daysInMonth(m);
  let count=0; const [y,mo]=m.split('-').map(Number);
  for(let d=1; d<=totalDays; d++){ const day=new Date(y,mo-1,d).getDay(); if(day!==0 && day!==6) count++; }
  return count;
}

async function extractPdfText(file){
  const buf = await file.arrayBuffer();
  window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const pdf = await window.pdfjsLib.getDocument({data: buf}).promise;
  let text='';
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it=>it.str).join(' ') + '\n';
  }
  return text;
}

function wireScoring(){
  const fileInput = document.getElementById('docFile');
  if(!fileInput) return;
  const pasteArea = document.getElementById('docPaste');
  const analyzeBtn = document.getElementById('analyzeBtn');
  const scorePanel = document.getElementById('scorePanel');

  analyzeBtn.onclick = async () => {
    scorePanel.style.display='block';
    scorePanel.innerHTML = '<div class="loading">Reading document and scoring against PFMA criteria...</div>';
    try{
      let text = pasteArea.value.trim();
      if(!text && fileInput.files[0]){
        const f = fileInput.files[0];
        text = (f.type === 'application/pdf' || f.name.endsWith('.pdf')) ? await extractPdfText(f) : await f.text();
      }
      if(!text){ scorePanel.innerHTML = '<div class="loading">Upload a file or paste the tender text first.</div>'; return; }
      const res = await fetch('/.netlify/functions/analyze', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ text }) });
      const result = JSON.parse(await res.text());
      renderScoreCard(result);
    }catch(e){
      scorePanel.innerHTML = '<div class="loading">Could not score this document. Try pasting the text directly. ('+e.message+')</div>';
    }
  };
}

function download(filename, content){
  const blob = new Blob([content], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}
function buildReport(days, label, catRows, catLabel){
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-days+1);
  const cutoffStr = cutoff.toISOString().slice(0,10);
  const subset = catRows.filter(r => (r.created_at||"").slice(0,10) >= cutoffStr);
  let out = `IVY AFRICA ${catLabel.toUpperCase()} REPORT — ${label}\nGenerated: ${todayStr()}\nPeriod: ${cutoffStr} to ${todayStr()}\n\n`;
  STATUSES.forEach(s=>{
    const grp = subset.filter(r=>r.status===s);
    const val = grp.reduce((a,r)=>a+Number(r.value),0);
    out += `${s.toUpperCase()} (${grp.length}) — ${fmtR(val)}\n`;
    grp.forEach(r=>{ out += `  - ${r.name} | ${r.entity||"—"} | ${fmtR(r.value)} | deadline ${r.deadline||"—"} | logged by ${r.logged_by_email||"—"}\n`; });
    out += `\n`;
  });
  out += `TOTAL VALUE THIS PERIOD: ${fmtR(subset.reduce((a,r)=>a+Number(r.value),0))}\n`;
  return out;
}

async function loadTeamData(){
  const start = currentMonth + "-01";
  const [y,m] = currentMonth.split('-').map(Number);
  const end = new Date(y, m, 1).toISOString().slice(0,10);
  const [{data: allRows}, {data: profiles}, {data: logins}] = await Promise.all([
    sb.from('tenders').select('*').gte('created_at', start).lt('created_at', end),
    sb.from('profiles').select('*'),
    sb.from('login_logs').select('*').gte('logged_in_at', start).lt('logged_in_at', end).order('logged_in_at', {ascending:false})
  ]);
  const byEmail = {};
  (profiles||[]).forEach(p => { byEmail[p.email] = { name:p.full_name||p.email, role:p.role||'—', submitted:0, won:0, lost:0, value:0, lastLogin:null, lastCity:null }; });
  (allRows||[]).forEach(r => {
    const e = r.logged_by_email;
    if(!e) return;
    if(!byEmail[e]) byEmail[e] = { name:e, role:'—', submitted:0, won:0, lost:0, value:0, lastLogin:null, lastCity:null };
    if(r.status==='submitted' || r.status==='won' || r.status==='lost') byEmail[e].submitted++;
    if(r.status==='won') byEmail[e].won++;
    if(r.status==='lost') byEmail[e].lost++;
    byEmail[e].value += Number(r.value||0);
  });
  (logins||[]).forEach(l => {
    if(!byEmail[l.email]) byEmail[l.email] = { name:l.email, role:'—', submitted:0, won:0, lost:0, value:0, lastLogin:null, lastCity:null };
    if(!byEmail[l.email].lastLogin){ byEmail[l.email].lastLogin = l.logged_in_at; byEmail[l.email].lastCity = [l.city,l.country].filter(Boolean).join(', '); }
  });
  const list = Object.values(byEmail).sort((a,b)=> b.submitted - a.submitted);
  const totalSubmitted = list.reduce((s,p)=>s+p.submitted,0);
  const totalValue = list.reduce((s,p)=>s+p.value,0);

  return `
    <div id="teamMount">
      <div class="grid2">
        <div class="kpi"><div class="label">Team members active</div><div class="val">${list.length}</div></div>
        <div class="kpi"><div class="label">Total submitted (month)</div><div class="val">${totalSubmitted}</div></div>
        <div class="kpi goal"><div class="label">Total value (month)</div><div class="val">${fmtR(totalValue)}</div></div>
      </div>
      <div class="panel">
        <h2>Per-employee performance — ${monthLabel(currentMonth)}</h2>
        <table>
          <thead><tr><th>Employee</th><th>Role</th><th>Submitted</th><th>Won</th><th>Lost</th><th>Value logged</th><th>Last login</th><th>Last location</th></tr></thead>
          <tbody>
            ${list.map(p=>`
              <tr>
                <td>${p.name}</td><td>${p.role}</td><td>${p.submitted}</td>
                <td style="color:var(--green);font-weight:700;">${p.won}</td>
                <td style="color:#B23B2E;font-weight:700;">${p.lost}</td>
                <td>${fmtR(p.value)}</td>
                <td style="font-size:11px;">${p.lastLogin ? new Date(p.lastLogin).toLocaleString('en-ZA') : '—'}</td>
                <td style="font-size:11px;">${p.lastCity || '—'}</td>
              </tr>`).join('') || `<tr><td colspan="8" class="empty">No activity yet this month.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

    <div class="tabbar">
      <button data-tab="live" class="${activeTab==='live'?'active':''}">Live Opportunities</button>
      <button data-tab="tenders" class="${activeTab==='tenders'?'active':''}">Tenders<span class="pill">${tenderRows.length}</span></button>
      <button data-tab="grants" class="${activeTab==='grants'?'active':''}">Other Opportunities<span class="pill">${grantRows.length}</span></button>
      <button data-tab="reports" class="${activeTab==='reports'?'active':''}">Reports</button>
      ${profile && profile.is_admin ? `<button data-tab="team" class="${activeTab==='team'?'active':''}">Team</button>` : ''}
    </div>

    ${body}

    <div class="footer">© ${new Date().getFullYear()} Ivy Africa (Pty) Ltd. All rights reserved.</div>
    <div id="profileModalWrap"></div>
  `;

  document.getElementById('logoutBtn').onclick = () => sb.auth.signOut();
  document.querySelectorAll('.tabbar button').forEach(b=>{ b.onclick = ()=>{ activeTab = b.dataset.tab; render(); }; });
  document.getElementById('profileAvatar').onclick = () => openProfileModal(tenderRows, grantRows);

  if(activeTab === 'tenders' || activeTab === 'grants'){
    document.getElementById('prevM').onclick = ()=>shiftMonth(-1);
    document.getElementById('nextM').onclick = ()=>shiftMonth(1);
    const catRows = activeTab==='tenders' ? tenderRows : grantRows;
    const addBtn = document.getElementById('fAdd');
    if(addBtn) addBtn.onclick = ()=>{
      addRow(document.getElementById('fName').value.trim(), document.getElementById('fEntity').value.trim(),
        document.getElementById('fValue').value, document.getElementById('fDeadline').value, null, addBtn.dataset.cat);
    };
    document.querySelectorAll('.statusSel').forEach(sel=>{ sel.onchange = e => updateStatus(e.target.dataset.id, e.target.value); });
    document.querySelectorAll('.editdate').forEach(sp=>{ sp.onclick = e => editSubmittedDate(e.target.dataset.editdate, e.target.dataset.current); });
    document.querySelectorAll('.del').forEach(btn=>{ btn.onclick = e => removeRow(e.target.dataset.id); });
    wireScoring();
  }

  if(activeTab === 'reports'){
    document.querySelectorAll('[data-report]').forEach(btn=>{
      btn.onclick = () => {
        const [scope, span] = btn.dataset.report.split(':');
        const catRows = scope==='tenders' ? tenderRows : scope==='grants' ? grantRows : rows;
        const catLabel = scope==='tenders' ? 'Tenders' : scope==='grants' ? 'Other Opportunities' : 'All Opportunities';
        const days = span==='daily' ? 1 : span==='weekly' ? 7 : daysInMonth(currentMonth);
        const label = span==='daily' ? 'Daily' : span==='weekly' ? 'Weekly' : 'Monthly';
        download(`${scope}-${span}-${todayStr()}.txt`, buildReport(days, label, catRows, catLabel));
      };
    });
  }
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/service-worker.js'));
}

init();
</script>
</body>
</html>
