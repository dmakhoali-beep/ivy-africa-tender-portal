<style>
:root{
  --green:#0B3D2E; --orange:#E8722C; --blue:#1B4F8C;
  --bg:#F5F3EC; --card:#FFFFFF; --line:#E4E0D4; --ink:#16231C; --mut:#6E7368;
  --display:'DM Serif Display', Georgia, serif;
  --eyebrow:'Syne', system-ui, sans-serif;
  --body:'DM Sans', system-ui, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:var(--body);}
body{background:var(--bg);color:var(--ink);}
#app{max-width:1100px;margin:0 auto;padding:28px 20px 60px;}
h1{font-family:var(--display);font-size:28px;font-weight:400;color:var(--green);}
.sub{font-family:var(--eyebrow);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);margin-top:6px;font-weight:600;}
.top{margin-bottom:24px;padding-bottom:18px;border-bottom:2px solid var(--green);display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px;}
.back{font-family:var(--eyebrow);font-size:11px;text-transform:uppercase;color:var(--blue);text-decoration:none;font-weight:700;}

.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filters button{font-family:var(--eyebrow);font-size:11px;text-transform:uppercase;font-weight:700;letter-spacing:.03em;padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:var(--card);cursor:pointer;}
.filters button.active{background:var(--green);color:#fff;border-color:var(--green);}

.row{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 18px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s;}
.row:hover{box-shadow:0 2px 10px rgba(22,35,28,.06);}
.row-head{display:flex;justify-content:space-between;align-items:center;gap:12px;}
.row-name{font-weight:700;font-size:14px;}
.row-entity{font-size:12px;color:var(--mut);margin-top:2px;}
.row-right{display:flex;align-items:center;gap:14px;}
.score{font-family:var(--display);font-size:20px;}
.verdict{font-family:var(--eyebrow);font-size:10px;text-transform:uppercase;font-weight:700;letter-spacing:.04em;padding:4px 11px;border-radius:20px;}
.verdict.go{background:#E4F0E9;color:var(--green);}
.verdict.sel{background:#FDEBD9;color:var(--orange);}
.verdict.avoid{background:#FBE4E1;color:#B23B2E;}
.chev{color:var(--mut);transition:transform .15s;font-size:12px;}
.row.open .chev{transform:rotate(90deg);}
.score-wrap{position:relative;display:inline-flex;align-items:center;}
.score-wrap:hover .why-tip{opacity:1;visibility:visible;transform:translateY(0);}
.why-tip{position:absolute;bottom:calc(100% + 8px);right:-10px;width:260px;background:var(--ink);color:#fff;font-family:var(--body);font-size:11.5px;line-height:1.45;padding:12px 14px;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.18);opacity:0;visibility:hidden;transform:translateY(4px);transition:opacity .15s,transform .15s;z-index:20;text-transform:none;letter-spacing:normal;font-weight:400;pointer-events:none;}
.why-tip::after{content:"";position:absolute;top:100%;right:16px;border:6px solid transparent;border-top-color:var(--ink);}
.why-label{font-family:var(--eyebrow);font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#B8D9C7;font-weight:700;display:block;margin-bottom:4px;}

.detail{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--line);font-size:13px;}
.row.open .detail{display:block;}
.detail dl{display:grid;grid-template-columns:140px 1fr;gap:6px 10px;margin-bottom:10px;}
.detail dt{font-family:var(--eyebrow);font-size:10px;text-transform:uppercase;color:var(--mut);font-weight:700;letter-spacing:.03em;}
.detail dd{color:var(--ink);}
.gates{margin:10px 0;}
.gates div{padding:4px 0;border-bottom:1px dashed var(--line);}
.addbtn{font-family:var(--eyebrow);background:var(--green);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;cursor:pointer;margin-top:8px;}
.addbtn:disabled{opacity:.5;cursor:default;}
.msg{font-size:11px;color:var(--mut);margin-top:6px;}
</style>
</head>

const WHY = {
  "Ikhala TVET — EON XR VR/AI Lab": "Already active under an executed MoA with dedicated merSETA funding — no competitive bid risk, this is pure execution against a signed contract.",
  "SITA — Network Hardware & Cabling": "5-year transversal contract with a standard e-portal process; strong volume and margin fit for existing ICT hardware distribution.",
  "SITA — VMware Enterprise Licensing": "36-month licensing revenue with low compliance friction; matches existing ICT reseller/partner capability directly.",

  "Agrément South Africa — Certification Digitalisation": "High long-term contract value, but the compulsory physical briefing attendance is unconfirmed — score is discounted heavily for disqualification risk.",
  "merSETA — Enterprise Licences": "Closing date (07 Jul, 12:00) has passed with no confirmed extension — archived at zero.",
  "merSETA — Data Governance & Architecture": "Closing date (08 Jul, 12:00) has passed with no confirmed extension — archived at zero.",

  "HSRC — Eventee App Subscription": "Single license, minimal margin, and very low strategic value — barely worth the administrative effort to submit.",
  "C-BRTA — DirectHire Software Renewal": "Mandatory SAGE and MCI reseller badges are not held — this is a hard disqualifier at the documentation-check stage.",

};
let activeFilter = "all";

function fmtR(n){ return n ? "R "+Number(n).toLocaleString('en-ZA') : "Not stated"; }

function render(){
  const app = document.getElementById('app');
  const list = OPPORTUNITIES
    .filter(o => activeFilter === "all" || o.verdict === activeFilter)
    .sort((a,b) => b.score - a.score);

  app.innerHTML = `
    <div class="top">
      <div>
        <h1>Opportunity Pipeline</h1>
        <div class="sub">Click any row for full tender detail</div>
      </div>
      <a class="back" href="/">← Back to portal</a>
    </div>
    <div class="filters">
      ${["all","go","sel","avoid"].map(f => `
        <button data-f="${f}" class="${activeFilter===f?'active':''}">${f==="all"?"All":VERDICT_LABEL[f]}</button>
      `).join('')}
    </div>
    <div id="rows"></div>
  `;

  document.querySelectorAll('.filters button').forEach(b => {
    b.onclick = () => { activeFilter = b.dataset.f; render(); };
  });

  const rowsEl = document.getElementById('rows');
  rowsEl.innerHTML = list.map((o, i) => `
    <div class="row" data-i="${i}">
      <div class="row-head">
        <div>
          <div class="row-name">${o.name}</div>
          <div class="row-entity">${o.entity} ${o.ref !== "—" ? "· " + o.ref : ""}</div>
        </div>
        <div class="row-right">
          <span class="verdict ${o.verdict}">${VERDICT_LABEL[o.verdict]}</span>
          <span class="score-wrap">
            <span class="score">${o.score}</span>
            <span class="why-tip"><span class="why-label">Why this score</span>${WHY[o.name] || "Justification not yet documented."}</span>
          </span>
          <span class="chev">▶</span>
        </div>
      </div>
      <div class="detail">
        <dl>
          <dt>Closing</dt><dd>${o.closing}</dd>
          <dt>Value</dt><dd>${fmtR(o.value)}</dd>
          <dt>Contact</dt><dd>${o.contact}</dd>
          <dt>Why this score</dt><dd>${WHY[o.name] || "Justification not yet documented."}</dd>
        </dl>
        <p>${o.scope}</p>
        <div class="gates">${o.gates.map(g => `<div>${g}</div>`).join('')}</div>
        <button class="addbtn" data-add="${i}">Add to pipeline board</button>
        <div class="msg" data-msg="${i}"></div>
      </div>
    </div>
  `).join('');

  rowsEl.querySelectorAll('.row').forEach(row => {
    row.addEventListener('click', (e) => {
      if(e.target.closest('.addbtn')) return;
      row.classList.toggle('open');
    });
  });

  rowsEl.querySelectorAll('[data-add]').forEach(btn => {
    btn.onclick = async () => {
      const o = list[Number(btn.dataset.add)];
      btn.disabled = true;
      const msg = rowsEl.querySelector(`[data-msg="${btn.dataset.add}"]`);
      const { error } = await sb.from('tenders').insert({
        name: o.name, entity: o.entity, value: o.value || 0, status: 'pipeline', deadline: null
      });
      msg.textContent = error ? error.message : "Added to the tender portal.";
    };
  });
}

render();
</script>
